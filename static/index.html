<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sprint Generator · LightOn</title>
<style>
  :root{
    --bg:#0f1117;--surface:#1a1d27;--card:#222536;--border:#2e3147;
    --accent:#6c63ff;--accent2:#ff6584;--green:#4ade80;--yellow:#facc15;
    --red:#f87171;--text:#e2e8f0;--muted:#8892a4;--radius:12px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}
  /* ── Header ── */
  header{background:var(--surface);border-bottom:1px solid var(--border);
    padding:18px 32px;display:flex;align-items:center;gap:12px}
  header svg{width:32px;height:32px}
  header h1{font-size:1.25rem;font-weight:700;letter-spacing:-.3px}
  header span{color:var(--accent);font-weight:800}
  /* ── Layout ── */
  .layout{display:grid;grid-template-columns:420px 1fr;min-height:calc(100vh - 65px)}
  .sidebar{background:var(--surface);border-right:1px solid var(--border);padding:28px 24px;overflow-y:auto}
  .main{padding:28px 32px;overflow-y:auto}
  /* ── Form ── */
  .section-title{font-size:.7rem;font-weight:700;letter-spacing:1.5px;
    text-transform:uppercase;color:var(--accent);margin-bottom:14px;margin-top:24px}
  .section-title:first-child{margin-top:0}
  label{display:block;font-size:.82rem;color:var(--muted);margin-bottom:5px;font-weight:500}
  input,select,textarea{width:100%;background:var(--card);border:1px solid var(--border);
    color:var(--text);border-radius:8px;padding:9px 12px;font-size:.88rem;
    outline:none;transition:border .2s}
  input:focus,select:focus,textarea:focus{border-color:var(--accent)}
  textarea{resize:vertical;min-height:80px}
  .field{margin-bottom:14px}
  .row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  /* ── Team members ── */
  #team-list{display:flex;flex-direction:column;gap:10px;margin-bottom:14px}
  .member-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 14px;position:relative}
  .member-card .member-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
  .member-name-display{font-weight:600;font-size:.9rem}
  .member-role-badge{background:var(--accent);color:#fff;font-size:.7rem;
    padding:2px 8px;border-radius:20px;font-weight:600}
  .remove-btn{background:none;border:none;cursor:pointer;color:var(--muted);
    font-size:1rem;padding:2px 6px;border-radius:6px;transition:color .2s,background .2s}
  .remove-btn:hover{color:var(--red);background:rgba(248,113,113,.1)}
  .member-fields{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .add-member-btn{width:100%;padding:10px;border:2px dashed var(--border);
    background:transparent;color:var(--muted);border-radius:10px;cursor:pointer;
    font-size:.85rem;font-weight:600;transition:all .2s;display:flex;align-items:center;
    justify-content:center;gap:6px}
  .add-member-btn:hover{border-color:var(--accent);color:var(--accent)}
  /* ── Generate button ── */
  .generate-btn{width:100%;margin-top:20px;padding:14px;background:var(--accent);
    color:#fff;border:none;border-radius:10px;font-size:.95rem;font-weight:700;
    cursor:pointer;letter-spacing:.3px;transition:opacity .2s,transform .1s;
    display:flex;align-items:center;justify-content:center;gap:8px}
  .generate-btn:hover{opacity:.88}
  .generate-btn:active{transform:scale(.98)}
  .generate-btn:disabled{opacity:.45;cursor:not-allowed}
  /* ── Spinner ── */
  .spinner{width:18px;height:18px;border:2.5px solid rgba(255,255,255,.3);
    border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:none}
  @keyframes spin{to{transform:rotate(360deg)}}
  /* ── Empty / Error state ── */
  .empty-state{display:flex;flex-direction:column;align-items:center;
    justify-content:center;height:100%;gap:16px;color:var(--muted);text-align:center}
  .empty-state svg{opacity:.25;width:64px;height:64px}
  .empty-state p{font-size:.9rem;max-width:320px;line-height:1.6}
  .error-box{background:rgba(248,113,113,.1);border:1px solid var(--red);
    border-radius:10px;padding:16px;color:var(--red);font-size:.85rem;line-height:1.6}
  /* ── Results ── */
  .project-header{background:linear-gradient(135deg,#6c63ff22,#ff658422);
    border:1px solid var(--border);border-radius:var(--radius);padding:22px 24px;margin-bottom:24px}
  .project-header h2{font-size:1.5rem;font-weight:800;margin-bottom:6px}
  .project-header p{color:var(--muted);font-size:.88rem;line-height:1.6}
  .stats-row{display:flex;gap:14px;margin-top:14px;flex-wrap:wrap}
  .stat-chip{background:var(--card);border:1px solid var(--border);border-radius:8px;
    padding:7px 14px;font-size:.8rem;font-weight:600;display:flex;align-items:center;gap:6px}
  .stat-chip span{color:var(--muted);font-weight:400}
  /* ── Tabs ── */
  .tabs{display:flex;gap:6px;margin-bottom:22px;border-bottom:1px solid var(--border);padding-bottom:0}
  .tab{padding:10px 16px;background:none;border:none;color:var(--muted);cursor:pointer;
    font-size:.88rem;font-weight:600;border-bottom:2px solid transparent;
    transition:color .2s,border-color .2s;margin-bottom:-1px}
  .tab.active{color:var(--accent);border-bottom-color:var(--accent)}
  .tab:hover:not(.active){color:var(--text)}
  .tab-content{display:none}
  .tab-content.active{display:block}
  /* ── Sprint cards ── */
  .sprint-card{background:var(--card);border:1px solid var(--border);
    border-radius:var(--radius);margin-bottom:20px;overflow:hidden}
  .sprint-card-header{background:var(--surface);padding:14px 20px;
    display:flex;justify-content:space-between;align-items:center}
  .sprint-title{font-weight:700;font-size:.95rem}
  .sprint-goal{color:var(--muted);font-size:.8rem;margin-top:2px}
  .sprint-meta{display:flex;gap:8px;align-items:center}
  .badge{padding:3px 10px;border-radius:20px;font-size:.72rem;font-weight:700}
  .badge-purple{background:rgba(108,99,255,.2);color:#a89fff}
  .badge-teal{background:rgba(74,222,128,.15);color:var(--green)}
  .sprint-body{padding:16px 20px}
  /* ── Task table ── */
  .task-table{width:100%;border-collapse:collapse;font-size:.82rem}
  .task-table th{text-align:left;padding:8px 12px;color:var(--muted);
    font-size:.7rem;font-weight:700;letter-spacing:.8px;text-transform:uppercase;
    border-bottom:1px solid var(--border)}
  .task-table td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:top}
  .task-table tr:last-child td{border-bottom:none}
  .task-table tr:hover td{background:rgba(255,255,255,.02)}
  .task-id{color:var(--muted);font-family:monospace;font-size:.75rem}
  .task-title{font-weight:600;color:var(--text)}
  .task-desc{color:var(--muted);font-size:.78rem;margin-top:2px}
  .type-badge{padding:2px 8px;border-radius:20px;font-size:.68rem;font-weight:700;white-space:nowrap}
  .type-Feature{background:rgba(108,99,255,.2);color:#a89fff}
  .type-Bug{background:rgba(248,113,113,.2);color:#fca5a5}
  .type-Infra{background:rgba(234,179,8,.15);color:#fde68a}
  .type-Research{background:rgba(56,189,248,.15);color:#7dd3fc}
  .type-Testing{background:rgba(74,222,128,.15);color:#86efac}
  .type-Design{background:rgba(255,101,132,.15);color:#fda4af}
  .prio-High{color:var(--red);font-weight:700}
  .prio-Medium{color:var(--yellow);font-weight:700}
  .prio-Low{color:var(--green);font-weight:700}
  .sp-pill{background:var(--surface);border:1px solid var(--border);border-radius:6px;
    padding:2px 9px;font-weight:700;font-size:.8rem;text-align:center;white-space:nowrap}
  .assignee-tag{display:inline-flex;align-items:center;gap:5px}
  .avatar{width:22px;height:22px;border-radius:50%;background:var(--accent);
    color:#fff;font-size:.65rem;font-weight:800;display:inline-flex;
    align-items:center;justify-content:center;flex-shrink:0}
  /* ── Workload tab ── */
  .workload-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px}
  .workload-card{background:var(--card);border:1px solid var(--border);
    border-radius:var(--radius);padding:18px}
  .workload-card h4{font-size:.9rem;font-weight:700;margin-bottom:4px}
  .workload-card .focus{color:var(--muted);font-size:.78rem;margin-bottom:12px}
  .wl-stat{display:flex;justify-content:space-between;align-items:center;
    margin-bottom:6px;font-size:.82rem}
  .wl-bar{height:6px;background:var(--border);border-radius:3px;overflow:hidden;margin-bottom:12px}
  .wl-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--accent),#a89fff);
    transition:width .5s ease}
  /* ── Recommendations ── */
  .rec-list{display:flex;flex-direction:column;gap:10px}
  .rec-item{background:var(--card);border:1px solid var(--border);border-left:3px solid var(--accent);
    border-radius:10px;padding:14px 16px;font-size:.87rem;line-height:1.6}
  /* ── Overview workload per sprint ── */
  .member-sprint-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;margin-top:12px}
  /* ── Scrollbar ── */
  ::-webkit-scrollbar{width:6px;height:6px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
  @media(max-width:900px){
    .layout{grid-template-columns:1fr}
    .sidebar{border-right:none;border-bottom:1px solid var(--border)}
  }
</style>
</head>
<body>

<header>
  <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
    <rect width="40" height="40" rx="10" fill="#6c63ff"/>
    <path d="M10 28 L20 12 L30 28" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="20" cy="12" r="3" fill="white"/>
  </svg>
  <h1>Sprint <span>Generator</span> · LightOn Paradigm</h1>
</header>

<div class="layout">
  <!-- ───────── SIDEBAR ───────── -->
  <aside class="sidebar">
    <div class="section-title">Project Details</div>

    <div class="field">
      <label>Project Name</label>
      <input id="project-name" type="text" placeholder="e.g. E-commerce Platform"/>
    </div>
    <div class="field">
      <label>Description</label>
      <textarea id="project-desc" placeholder="Briefly describe what the project does and its main goals…"></textarea>
    </div>
    <div class="field">
      <label>Tech Stack</label>
      <input id="tech-stack" type="text" placeholder="e.g. React, FastAPI, PostgreSQL, Docker"/>
    </div>
    <div class="row">
      <div class="field">
        <label>Sprint Duration (weeks)</label>
        <select id="sprint-duration">
          <option value="1">1 week</option>
          <option value="2" selected>2 weeks</option>
          <option value="3">3 weeks</option>
          <option value="4">4 weeks</option>
        </select>
      </div>
      <div class="field">
        <label>Number of Sprints</label>
        <select id="sprint-count">
          <option value="2">2 sprints</option>
          <option value="3" selected>3 sprints</option>
          <option value="4">4 sprints</option>
          <option value="5">5 sprints</option>
          <option value="6">6 sprints</option>
        </select>
      </div>
    </div>

    <div class="section-title" style="margin-top:20px">Team Members</div>
    <div id="team-list"></div>
    <button class="add-member-btn" onclick="addMember()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Add Team Member
    </button>

    <button class="generate-btn" id="gen-btn" onclick="generate()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      <div class="spinner" id="spinner"></div>
      <span id="btn-label">Generate Sprints</span>
    </button>
  </aside>

  <!-- ───────── MAIN ───────── -->
  <main class="main" id="main-content">
    <div class="empty-state" id="empty-state">
      <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="8" y="8" width="48" height="48" rx="8" stroke="currentColor" stroke-width="2"/>
        <path d="M20 32 h24 M20 22 h16 M20 42 h20" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <p>Fill in the project details and add your team members, then click <strong>Generate Sprints</strong> to let LightOn AI plan your project.</p>
    </div>
    <div id="results" style="display:none"></div>
  </main>
</div>

<script>
// ── State ─────────────────────────────────────────────────────────────────
let memberCount = 0;
const roles = ["Frontend Dev","Backend Dev","Fullstack Dev","DevOps","QA Engineer","UI/UX Designer","Data Engineer","Project Manager","Tech Lead","Mobile Dev"];
const seniorities = ["Junior","Mid","Senior","Lead"];
const avatarColors = ["#6c63ff","#ff6584","#43b89c","#f59e0b","#3b82f6","#8b5cf6","#10b981","#f97316"];

// ── Team builder ──────────────────────────────────────────────────────────
function addMember(){
  memberCount++;
  const id = memberCount;
  const color = avatarColors[(id-1) % avatarColors.length];
  const el = document.createElement("div");
  el.className = "member-card";
  el.id = `member-${id}`;
  el.innerHTML = `
    <div class="member-header">
      <div style="display:flex;align-items:center;gap:8px">
        <div class="avatar" id="av-${id}" style="background:${color}">?</div>
        <div class="member-name-display" id="nd-${id}">New Member</div>
      </div>
      <button class="remove-btn" onclick="removeMember(${id})" title="Remove">✕</button>
    </div>
    <div class="member-fields">
      <div class="field" style="margin:0">
        <label>Full Name</label>
        <input type="text" placeholder="e.g. Alice Martin" oninput="updateMemberDisplay(${id},this.value)" onchange="updateMemberDisplay(${id},this.value)"/>
      </div>
      <div class="field" style="margin:0">
        <label>Role</label>
        <select>
          ${roles.map(r=>`<option>${r}</option>`).join("")}
        </select>
      </div>
      <div class="field" style="margin:0;grid-column:1/-1">
        <label>Seniority</label>
        <select>
          ${seniorities.map(s=>`<option>${s}</option>`).join("")}
        </select>
      </div>
    </div>`;
  document.getElementById("team-list").appendChild(el);
}

function removeMember(id){
  document.getElementById(`member-${id}`)?.remove();
}

function updateMemberDisplay(id, val){
  const name = val.trim() || "New Member";
  document.getElementById(`nd-${id}`).textContent = name;
  document.getElementById(`av-${id}`).textContent = name.split(" ").map(p=>p[0]).join("").slice(0,2).toUpperCase();
}

function getTeam(){
  return [...document.getElementById("team-list").querySelectorAll(".member-card")].map(card=>{
    const inputs = card.querySelectorAll("input,select");
    return {
      name: inputs[0].value.trim() || "Unknown",
      role: inputs[1].value,
      seniority: inputs[2].value,
    };
  });
}

// ── Generate ──────────────────────────────────────────────────────────────
async function generate(){
  const name = document.getElementById("project-name").value.trim();
  const desc = document.getElementById("project-desc").value.trim();
  if(!name || !desc){ alert("Please fill in project name and description."); return; }
  const team = getTeam();
  if(team.length === 0){ alert("Please add at least one team member."); return; }

  const btn = document.getElementById("gen-btn");
  btn.disabled = true;
  document.getElementById("spinner").style.display = "block";
  document.getElementById("btn-label").textContent = "Generating…";
  document.getElementById("empty-state").style.display = "none";
  document.getElementById("results").style.display = "none";

  const payload = {
    project_name: name,
    project_description: desc,
    tech_stack: document.getElementById("tech-stack").value.trim(),
    sprint_duration_weeks: parseInt(document.getElementById("sprint-duration").value),
    sprint_count: parseInt(document.getElementById("sprint-count").value),
    team,
  };

  try {
    const res = await fetch("/api/generate-sprints",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify(payload),
    });
    if(!res.ok){
      const err = await res.json();
      throw new Error(err.detail || "Server error");
    }
    const data = await res.json();
    renderResults(data);
  } catch(e){
    document.getElementById("empty-state").style.display = "flex";
    document.getElementById("results").innerHTML = `<div class="error-box">⚠️ <strong>Error:</strong> ${e.message}</div>`;
    document.getElementById("results").style.display = "block";
  } finally {
    btn.disabled = false;
    document.getElementById("spinner").style.display = "none";
    document.getElementById("btn-label").textContent = "Generate Sprints";
  }
}

// ── Render ────────────────────────────────────────────────────────────────
function initials(name){ return (name||"?").split(" ").map(p=>p[0]).join("").slice(0,2).toUpperCase(); }
function avatarColor(name){
  let h = 0; for(const c of (name||"")) h = (h<<5) - h + c.charCodeAt(0);
  return avatarColors[Math.abs(h) % avatarColors.length];
}

function renderResults(data){
  const container = document.getElementById("results");
  const totalTasks = data.sprints.reduce((s,sp)=>s+sp.tasks.length,0);
  const totalSP = data.sprints.reduce((s,sp)=>s+sp.tasks.reduce((a,t)=>a+(t.story_points||0),0),0);

  let html = `
    <div class="project-header">
      <h2>${esc(data.project_name)}</h2>
      <p>${esc(data.summary||"")}</p>
      <div class="stats-row">
        <div class="stat-chip">📅 ${data.sprints.length} sprints <span>/ ${data.total_weeks}w total</span></div>
        <div class="stat-chip">✅ ${totalTasks} tasks</div>
        <div class="stat-chip">⚡ ${totalSP} story points</div>
        <div class="stat-chip">👥 ${Object.keys(data.sprints[0]?.team_workload||{}).length} members</div>
      </div>
    </div>

    <div class="tabs" id="tabs">
      <button class="tab active" onclick="switchTab('sprints')">Sprints & Tasks</button>
      <button class="tab" onclick="switchTab('workload')">Workload Overview</button>
      <button class="tab" onclick="switchTab('recs')">Recommendations</button>
    </div>

    <!-- SPRINTS TAB -->
    <div class="tab-content active" id="tab-sprints">
      ${data.sprints.map(sp => renderSprintCard(sp)).join("")}
    </div>

    <!-- WORKLOAD TAB -->
    <div class="tab-content" id="tab-workload">
      ${renderWorkloadOverview(data)}
    </div>

    <!-- RECS TAB -->
    <div class="tab-content" id="tab-recs">
      <div class="rec-list">
        ${(data.recommendations||[]).map(r=>`<div class="rec-item">💡 ${esc(r)}</div>`).join("")}
      </div>
    </div>`;

  container.innerHTML = html;
  container.style.display = "block";
}

function renderSprintCard(sp){
  const spTotal = sp.tasks.reduce((a,t)=>a+(t.story_points||0),0);
  return `
    <div class="sprint-card">
      <div class="sprint-card-header">
        <div>
          <div class="sprint-title">Sprint ${sp.sprint_number} · Week ${sp.start_week}–${sp.end_week}</div>
          <div class="sprint-goal">${esc(sp.goal)}</div>
        </div>
        <div class="sprint-meta">
          <div class="badge badge-purple">${sp.tasks.length} tasks</div>
          <div class="badge badge-teal">${spTotal} SP</div>
        </div>
      </div>
      <div class="sprint-body">
        <div style="overflow-x:auto">
          <table class="task-table">
            <thead><tr>
              <th>ID</th><th>Task</th><th>Assignee</th><th>Type</th><th>Priority</th><th>SP</th>
            </tr></thead>
            <tbody>
              ${sp.tasks.map(t=>`
                <tr>
                  <td class="task-id">${esc(t.id)}</td>
                  <td>
                    <div class="task-title">${esc(t.title)}</div>
                    <div class="task-desc">${esc(t.description)}</div>
                  </td>
                  <td>
                    <div class="assignee-tag">
                      <div class="avatar" style="background:${avatarColor(t.assignee)}">${initials(t.assignee)}</div>
                      ${esc(t.assignee)}
                    </div>
                  </td>
                  <td><span class="type-badge type-${t.type||"Feature"}">${esc(t.type||"Feature")}</span></td>
                  <td class="prio-${t.priority||"Medium"}">${esc(t.priority||"Medium")}</td>
                  <td><div class="sp-pill">${t.story_points||1}</div></td>
                </tr>`).join("")}
            </tbody>
          </table>
        </div>

        <div style="margin-top:14px">
          <div style="font-size:.75rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:10px">Team workload this sprint</div>
          <div class="member-sprint-grid">
            ${Object.entries(sp.team_workload||{}).map(([name,wl])=>`
              <div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 12px">
                <div style="display:flex;align-items:center;gap:7px;margin-bottom:6px">
                  <div class="avatar" style="background:${avatarColor(name)};width:26px;height:26px;font-size:.7rem">${initials(name)}</div>
                  <strong style="font-size:.82rem">${esc(name)}</strong>
                </div>
                <div style="font-size:.75rem;color:var(--muted);margin-bottom:4px">${esc(wl.focus||"")}</div>
                <div style="font-size:.78rem;display:flex;justify-content:space-between">
                  <span>${wl.tasks_count} tasks</span>
                  <span style="color:var(--accent);font-weight:700">${wl.story_points} SP</span>
                </div>
              </div>`).join("")}
          </div>
        </div>
      </div>
    </div>`;
}

function renderWorkloadOverview(data){
  // Aggregate across all sprints
  const totals = {};
  data.sprints.forEach(sp=>{
    Object.entries(sp.team_workload||{}).forEach(([name,wl])=>{
      if(!totals[name]) totals[name]={tasks:0,sp:0,sprints:0};
      totals[name].tasks += wl.tasks_count||0;
      totals[name].sp += wl.story_points||0;
      totals[name].sprints++;
    });
  });
  const maxSP = Math.max(...Object.values(totals).map(v=>v.sp), 1);
  return `
    <div class="workload-grid">
      ${Object.entries(totals).map(([name,t])=>`
        <div class="workload-card">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
            <div class="avatar" style="background:${avatarColor(name)};width:32px;height:32px;font-size:.75rem">${initials(name)}</div>
            <h4>${esc(name)}</h4>
          </div>
          <div class="wl-stat"><span>${t.tasks} total tasks</span><strong>${t.sp} SP</strong></div>
          <div class="wl-bar"><div class="wl-fill" style="width:${Math.round(t.sp/maxSP*100)}%"></div></div>
          <div class="wl-stat" style="font-size:.75rem;color:var(--muted)">
            <span>Avg / sprint</span>
            <span>${(t.sp/data.sprints.length).toFixed(1)} SP · ${(t.tasks/data.sprints.length).toFixed(1)} tasks</span>
          </div>
        </div>`).join("")}
    </div>`;
}

// ── Tabs ──────────────────────────────────────────────────────────────────
function switchTab(id){
  document.querySelectorAll(".tab-content").forEach(el=>el.classList.remove("active"));
  document.querySelectorAll(".tab").forEach(el=>el.classList.remove("active"));
  document.getElementById(`tab-${id}`).classList.add("active");
  document.querySelectorAll(".tab").forEach(el=>{
    if(el.getAttribute("onclick")?.includes(id)) el.classList.add("active");
  });
}

// ── Utils ─────────────────────────────────────────────────────────────────
function esc(s){ const d=document.createElement("div");d.textContent=String(s||"");return d.innerHTML; }

// ── Init: add 3 default members ───────────────────────────────────────────
addMember(); addMember(); addMember();
</script>
